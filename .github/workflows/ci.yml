name: Order System CI Pipeline

on:
  push:
    branches: [ "master" ]
    paths:
      - "commons/**"
      - "messaging-starter/**"
      - "order-service/**"
      - "inventory-service/**"
      - "payment-service/**"
      - "notification-service/**"
      - "pom.xml"

  pull_request:
    branches: [ "master" ]
    paths:
      - "commons/**"
      - "messaging-starter/**"
      - "order-service/**"
      - "inventory-service/**"
      - "payment-service/**"
      - "notification-service/**"
      - "pom.xml"

jobs:
  changes:
    name: Identify changes
    runs-on: ubuntu-latest
    outputs:
      order: ${{ steps.filter.outputs.order }}
      inventory: ${{ steps.filter.outputs.inventory }}
      payment: ${{ steps.filter.outputs.payment }}
      notification: ${{ steps.filter.outputs.notification }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
           order:
            - 'order-service/**'
            - 'commons/**'
            - 'messaging-starter/**'
           inventory:
             - 'inventory-service/**'
             - 'commons/**'
             - 'messaging-starter/**' 
           payment:
            - 'payment-service/**'
            - 'commons/**'
            - 'messaging-starter/**'
           notification:
            - 'notification-service/**'
            - 'commons/**'


  # build services
  build-service:
    name: Build ${{ matrix.service }}
    needs: changes
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: order-service
            changed: order

          - service: payment-service
            changed: payment

          - service: inventory-service
            changed: inventory

          - service: notification-service
            changed: notification

    if: ${{ needs.changes.outputs[matrix.changed] == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Package service
        run: ./mvnw -pl ${{ matrix.service }} -am clean package

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ matrix.service }}:${{ github.sha }} \
            -f ${{ matrix.service }}/Dockerfile .

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-results
          path: ${{ matrix.service }}/target/surefire-reports/*.xml
