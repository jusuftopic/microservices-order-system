name: Order System CI Pipeline

on:
  push:
    branches: [ "master" ]
    paths:
      - "messaging-starter/**"
      - "order-service/**"
      - "inventory-service/**"
      - "payment-service/**"
      - "notification-service/**"
      - "pom.xml"

  pull_request:
    branches: [ "master" ]
    paths:
      - "messaging-starter/**"
      - "order-service/**"
      - "inventory-service/**"
      - "payment-service/**"
      - "notification-service/**"
      - "pom.xml"

jobs:
  changes:
    name: Identify changes
    runs-on: ubuntu-latest
    outputs:
      order: ${{ steps.filter.outputs.order }}
      inventory: ${{ steps.filter.outputs.inventory }}
      payment: ${{ steps.filter.outputs.payment }}
      notification: ${{ steps.filter.outputs.notification }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            order:
              - 'order-service/**'
              - 'messaging-starter/**'
            inventory:
              - 'inventory-service/**'
              - 'messaging-starter/**'
            payment:
              - 'payment-service/**'
              - 'messaging-starter/**'
            notification:
              - 'notification-service/**'
              - 'messaging-starter/**'

      - name: Build matrix
        id: set-matrix
        run: |
          matrix=$(jq -nc \
            --arg order "${{ steps.filter.outputs.order }}" \
            --arg payment "${{ steps.filter.outputs.payment }}" \
            --arg inventory "${{ steps.filter.outputs.inventory }}" \
            --arg notification "${{ steps.filter.outputs.notification }}" \
            '{include: [
              (if $order=="true" then {service:"order-service"} else empty end),
              (if $payment=="true" then {service:"payment-service"} else empty end),
              (if $inventory=="true" then {service:"inventory-service"} else empty end),
              (if $notification=="true" then {service:"notification-service"} else empty end)
            ]}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Computed matrix: $matrix"

  # build services
  build-service:
    name: Build ${{ matrix.service }}
    needs: changes
    if: ${{ needs.changes.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest

    strategy:
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Package service
        run: ./mvnw -pl ${{ matrix.service }} -am clean package

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ matrix.service }}:${{ github.sha }} \
            -f ${{ matrix.service }}/Dockerfile .

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-results
          path: ${{ matrix.service }}/target/surefire-reports/*.xml
