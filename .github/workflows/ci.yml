name: Order Service CI Pipeline

on:
  push:
    branches: [ "master" ]
    paths:
      - "commons/**"
      - "order-service/**"
      - "payment-service/**"
      - "pom.xml"

  pull_request:
    branches: [ "master" ]
    paths:
      - "commons/**"
      - "order-service/**"
      - "payment-service/**"
      - "pom.xml"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup environment Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # 3. Make mvnw executable
      - name: Grant execute permission
        run: chmod +x mvnw

      # 4. Build & test entire monorepo
      - name: Build
        run: ./mvnw clean verify

      - name: Run tests
        run: ./mvnw verify

      # 5 Upload test results in GitHub UI
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/target/surefire-reports/*.xml"

