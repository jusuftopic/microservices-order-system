name: Order Service CI Pipeline

on:
  push:
    branches: [ "master" ]
    paths:
      - "commons/**"
      - "order-service/**"
      - "inventory-service/**"
      - "payment-service/**"
      - "pom.xml"

  pull_request:
    branches: [ "master" ]
    paths:
      - "commons/**"
      - "order-service/**"
      - "inventory-service/**"
      - "payment-service/**"
      - "pom.xml"

jobs:
  changes:
    name: Identify changes
    runs-on: ubuntu-latest
    outputs:
      order: ${{ steps.filter.outputs.order }}
      inventory: ${{ steps.filter.outputs.inventory }}
      payment: ${{ steps.filter.outputs.payment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
           order:
            - 'order-service/**'
            - 'commons/**'
           inventory:
             - 'inventory-service/**'
             - 'commons/**'          
           payment:
            - 'payment-service/**'
            - 'commons/**'


  build:
    name: Build Services
    needs: changes
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [ order-service, payment-service, inventory-service ]
        include:
          - service: order-service
            enabled: ${{ needs.changes.outputs.order }}
          - service: payment-service
            enabled: ${{ needs.changes.outputs.payment }}
          - service: inventory-service
            enabled: ${{ needs.changes.outputs.inventory }}

    steps:
      - name: Skip CI if not changed
        if: matrix.enabled != 'true'
        run: echo "Skipping ${{ matrix.service }}" && exit 0

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Compile ${{ matrix.service }}
        run: ./mvnw -pl ${{ matrix.service }} -am clean compile

      - name: Test ${{ matrix.service }}
        run: ./mvnw -pl ${{ matrix.service }} -am test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-results
          path: "**/target/surefire-reports/*.xml"