# ===============================
# GENERAL CONFIG
# ===============================
spring.application.name=inventory-service
server.port=8083
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ===============================
# POSTGRES CONFIG
# ===============================
spring.datasource.url=jdbc:postgresql://inventory-db:5432/inventory_db
spring.datasource.username=inventory_user
spring.datasource.password=inventory_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ===============================
# CONNECTION POOL
# ===============================
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ===============================
# HEALTH CONFIG
# ===============================
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.server.port=8183
management.endpoint.health.group.readiness.include=kafka
management.endpoint.health.group.liveness.include=livenessState

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
# PRODUCER CONFIGS
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# 5 seconds timeout for producer API to reach Kafka
spring.kafka.producer.properties.max.block.ms=5000
# 5 seconds for broker response
spring.kafka.producer.properties.request.timeout.ms=5000
# 10 seconds timeout for the delivery (including retries, request time, backoff...)
spring.kafka.producer.properties.delivery.timeout.ms=10000

# CONSUMER CONFIGS
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Error handling wrapper
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
# Delegate actual deserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
# Target type
spring.kafka.consumer.properties.spring.json.use.type.headers=true
# Trust packages (for JSON)
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.listener.missing-topics-fatal=false
spring.kafka.listener.ack-mode=record

spring.kafka.admin.auto-create=true
spring.kafka.admin.fail-fast=true
app.kafka.topics.partitions=1
app.kafka.topics.replicas=1

logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.level.org.apache.kafka.clients.NetworkClient=ERROR
logging.level.o.a.k.c.c.internals=OFF