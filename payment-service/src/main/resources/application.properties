# ===============================
# GENERAL CONFIG
# ===============================
spring.application.name=payment-service
server.port=8082
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ===============================
# POSTGRES CONFIG
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:payment-db}:${DB_PORT:5432}/${DB_NAME:payment_db}
spring.datasource.username=${DB_USERNAME:payment_user}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# ===============================
# CONNECTION POOL
# ===============================
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
# PRODUCER CONFIGS
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# 5 seconds timeout for producer API to reach Kafka
spring.kafka.producer.properties.max.block.ms=5000
# 5 seconds for broker response
spring.kafka.producer.properties.request.timeout.ms=5000
# 10 seconds timeout for the delivery (including retries, request time, backoff...)
spring.kafka.producer.properties.delivery.timeout.ms=10000

# CONSUMER CONFIGS
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
# Delegate actual deserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
# Target type
spring.kafka.consumer.properties.spring.json.use.type.headers=true
# Trust packages (for JSON)
spring.kafka.consumer.properties.spring.json.trusted.packages=org.example.messagingstarter.contracts

spring.kafka.listener.missing-topics-fatal=false
spring.kafka.listener.ack-mode=record

spring.kafka.admin.auto-create=true
spring.kafka.admin.fail-fast=true
app.kafka.topics.partitions=1
app.kafka.topics.replicas=1

# ===============================
# RESILIENCY
# ===============================
# look at last 10 calls to decide failure rate
resilience4j.circuitbreaker.instances.payment.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.payment.slidingWindowSize=20
resilience4j.circuitbreaker.instances.payment.minimumNumberOfCalls=10
# 50% or more failures to open CB
resilience4j.circuitbreaker.instances.payment.failureRateThreshold=50
# wait 10 seconds before trying again
resilience4j.circuitbreaker.instances.payment.waitDurationInOpenState=10s
# allow 3 test calls to check if things are working
resilience4j.circuitbreaker.instances.payment.permittedNumberOfCallsInHalfOpenState=3
# coordinate CB state for slow calls
resilience4j.circuitbreaker.instances.payment.slowCallDurationThreshold=2s
resilience4j.circuitbreaker.instances.payment.slowCallRateThreshold=50

# allow 3 call attempts
resilience4j.retry.instances.payment.maxAttempts=3
# 0.5 seconds wait before each retry + backoff multiplier
resilience4j.retry.instances.payment.waitDuration=500ms
resilience4j.retry.instances.payment.enableExponentialBackoff=true
resilience4j.retry.instances.payment.exponentialBackoffMultiplier=2

# Retry on these exceptions
resilience4j.retry.instances.payment.retryExceptions=\
java.io.IOException,\
java.net.ConnectException,\
java.net.SocketTimeoutException,\
java.util.concurrent.TimeoutException,\
org.springframework.web.client.ResourceAccessException,\
org.springframework.web.client.HttpServerErrorException

# Ignore these exceptions
resilience4j.retry.instances.payment.ignoreExceptions=\
org.springframework.web.client.HttpClientErrorException


# ===============================
# HEALTH CONFIG
# ===============================
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.server.port=8182
management.endpoint.health.group.readiness.include=db,kafka
management.endpoint.health.group.liveness.include=livenessState
management.metrics.tags.application=${spring.application.name}

logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.level.org.apache.kafka.clients.NetworkClient=ERROR
logging.level.o.a.k.c.c.internals=OFF