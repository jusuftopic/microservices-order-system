spring.application.name=payment-service
server.port=8082

# ===============================
# H2 DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:h2:mem:orderingsystem
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Automatically create/update tables
spring.jpa.hibernate.ddl-auto=update

# ===============================
# H2 CONSOLE ENABLED
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allow console access (important in Spring Boot 2.5+ / 3+)
spring.h2.console.settings.web-allow-others=true

# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

# ===============================
# RESILIENCY
# ===============================
# look at last 10 calls to decide failure rate
resilience4j.circuitbreaker.instances.payment.slidingWindowSize=10
# 50% or more failures to open CB
resilience4j.circuitbreaker.instances.payment.failureRateThreshold=50
# wait 10 seconds before trying again
resilience4j.circuitbreaker.instances.payment.waitDurationInOpenState=10s
# allow 3 test calls to check if things are working
resilience4j.circuitbreaker.instances.payment.permittedNumberOfCallsInHalfOpenState=3

# allow 3 call attempts
resilience4j.retry.instances.payment.maxAttempts=3
# 0.5 seconds wait before each retry
resilience4j.retry.instances.payment.waitDuration=500ms
# retry on those exceptions
resilience4j.retry.instances.payment.retryExceptions=java.io.IOException, java.util.concurrent.TimeoutException, org.springframework.web.client.ResourceAccessException, org.springframework.web.client.HttpServerErrorException, org.springframework.web.client.HttpServerErrorException  

resilience4j.timelimiter.instances.payment.timeoutDuration=3s